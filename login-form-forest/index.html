<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--- Boxicons CDN Link -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Pashin | Developer</title>
  </head>

  <body>
    <div class="wrapper">
      <form class="login__box">
        <div class="login__header">
          <span>Login</span>
        </div>

        <div class="input__box">
          <input type="text" id="user" class="input__field" required />
          <label for="user" class="label">Username</label>
          <i class="bx bx-user icon"></i>
        </div>

        <div class="input__box">
          <input type="password" id="pass" class="input__field" required />
          <label for="pass" class="label">Password</label>
          <i class="bx bx-lock-alt icon"></i>
          <i class="bx bx-hide show-hide-password" id="togglePassword"></i>
        </div>

        <div class="role__selection">
          <select>
            <option value="fullstack">Fullstack Developer</option>
            <option value="frontend">Frontend Developer</option>
            <option value="backend">Backend Developer</option>
          </select>
        </div>

        <div class="remember__forgot">
          <div class="remember__me">
            <input type="checkbox" id="remember" />
            <label for="remember">Remember me</label>
          </div>
          <div class="forgot">
            <a href="#">Forgot Password?</a>
          </div>
        </div>

        <div class="input__box">
          <input type="submit" class="input__submit" value="Login" />
        </div>

        <div class="register">
          <span>Don't have an account?</span>
          <a href="#">Register</a>
        </div>
      </form>
    </div>
  </body>
</html>
